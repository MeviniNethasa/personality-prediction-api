<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Personality Classifier</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 40px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background-color: #007bff; color: white; border: none; padding: 12px; margin-top: 25px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 25px; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; display: none; font-size: 18px; }
        .Introvert { background-color: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
        .Extrovert { background-color: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Personality Predictor Engine</h2>
        <form id="predictorForm">
            <label>Time Spent Alone (Hours/Day):</label>
            <input type="number" id="alone" step="0.1" value="4.0" required>

            <label>Do you experience Stage Fear?</label>
            <select id="stage"><option value="1">Yes</option><option value="0">No</option></select>

            <label>Social Event Attendance Score (0-10):</label>
            <input type="number" id="social" step="0.1" value="5.0" required>

            <label>Going Outside Frequency Score (0-10):</label>
            <input type="number" id="outside" step="0.1" value="5.0" required>

            <label>Do you feel Drained after Socializing?</label>
            <select id="drained"><option value="1">Yes</option><option value="0">No</option></select>

            <label>Friends Circle Size:</label>
            <input type="number" id="friends" value="10" required>

            <label>Social Media Post Frequency (Per Week):</label>
            <input type="number" id="posts" value="3" required>

            <button type="submit">Analyze Profile</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('predictorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'none';

            const payload = {
                Time_spent_Alone: parseFloat(document.getElementById('alone').value),
                Stage_fear: parseInt(document.getElementById('stage').value),
                Social_event_attendance: parseFloat(document.getElementById('social').value),
                Going_outside: parseFloat(document.getElementById('outside').value),
                Drained_after_socializing: parseInt(document.getElementById('drained').value),
                Friends_circle_size: parseFloat(document.getElementById('friends').value),
                Post_frequency: parseFloat(document.getElementById('posts').value)
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                resultDiv.innerText = `Prediction: ${data.personality}`;
                resultDiv.className = data.personality;
                resultDiv.style.display = 'block';
            } catch (err) {
                resultDiv.innerText = "Error contacting API connection pipeline.";
                resultDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
